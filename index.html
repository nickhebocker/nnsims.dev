<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NNsims.dev | Automation & Robotics</title>

  <style>
    :root {
      --bg: #0d1117;
      --accent: #58a6ff;
      --text-main: #e6edf3;
      --text-dim: #8b949e;
      --nav-bg: rgba(22, 27, 34, 0.8);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* --- Navigation Bar --- */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      height: 60px;
      background: var(--nav-bg);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #30363d;
      z-index: 1000;
      display: flex;
      align-items: center;
      padding: 0 1rem;
    }

    .nav-scroll {
      display: flex;
      overflow-x: auto;
      white-space: nowrap;
      gap: 1.5rem;
      scrollbar-width: none; /* Hide scrollbar for Firefox */
      -ms-overflow-style: none; /* Hide scrollbar for IE/Edge */
      padding: 0 10px;
    }

    .nav-scroll::-webkit-scrollbar {
      display: none; /* Hide scrollbar for Chrome/Safari */
    }

    .nav-scroll a {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-scroll a:hover, .nav-scroll a.active {
      color: var(--accent);
    }

    /* --- Main Content --- */
    .hero {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 20px;
      text-align: center;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      margin-bottom: 0.5rem;
      letter-spacing: -1px;
      background: linear-gradient(90deg, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.tagline {
      font-size: clamp(1rem, 4vw, 1.25rem);
      color: var(--text-dim);
      margin-bottom: 2.5rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .cta-button {
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--accent);
      padding: 12px 32px;
      border-radius: 50px;
      font-weight: bold;
      transition: all 0.3s ease;
      box-shadow: 0 0 0 rgba(88, 166, 255, 0);
    }

    .cta-button:hover {
      background: var(--accent);
      color: var(--bg);
      box-shadow: 0 0 20px rgba(88, 166, 255, 0.4);
      transform: translateY(-2px);
    }

    /* --- Responsive Adjustments --- */
    
    /* Landscape specific tweaks (Mobile/Tablets) */
    @media (max-height: 500px) and (orientation: landscape) {
      .hero {
        padding-top: 80px;
        height: auto;
        min-height: 100vh;
      }
      h1 { font-size: 2.5rem; }
    }

    /* Desktop hover effects */
    @media (min-width: 1024px) {
      .nav-scroll {
        justify-content: center;
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-scroll">
      <a href="#" class="active">Home</a>
      <a href="#projects">Projects</a>
      <a href="#robotics">Robotics</a>
      <a href="#automation">Automation</a>
      <a href="#simulations">Simulations</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </div>
  </nav>

  <div class="hero">
    <h1>NNsims.dev</h1>
    <p class="tagline">Automation • Robotics • Projects</p>

    <a href="https://github.com/nickhebocker" target="_blank" class="cta-button">
      View My Work
    </a>
  </div>

</body>
</html>
